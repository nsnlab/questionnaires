<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACS/TIS Sensation Testing</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #000;
            line-height: 1.6;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 22px;
        }
        h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }
        .metadata-section {
            background-color: #f9f9f9;
            padding: 20px;
            border: 1px solid #ddd;
            margin-bottom: 25px;
        }
        .metadata-section h2 {
            margin-bottom: 15px;
        }
        .metadata-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .metadata-field {
            flex: 1;
            min-width: 150px;
        }
        .metadata-field label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
        }
        .metadata-field input,
        .metadata-field select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .page-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            background-color: #fff;
        }
        .page-section.investigator {
            background-color: #fff8e8;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #333;
        }
        .section-header {
            margin-bottom: 15px;
        }
        .section-header .section-label {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .section-header .header-fields {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding-bottom: 5px;
            border-bottom: 2px solid #333;
        }
        .section-header .header-field {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-header .header-field label {
            font-size: 13px;
            font-weight: bold;
        }
        .section-header .header-field input {
            width: 100px;
            padding: 6px 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .section-subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        .sensation-categories {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .sensation-category {
            flex: 1;
        }
        .category-header {
            font-size: 11px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            text-align: center;
            padding: 5px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            margin-bottom: 5px;
        }
        .sensation-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-top: none;
            background-color: #fff;
        }
        .sensation-item:last-child {
            border-bottom: 1px solid #ddd;
        }
        .sensation-item:first-of-type {
            border-top: 1px solid #ddd;
        }
        .sensation-check {
            width: 20px;
            text-align: center;
        }
        .sensation-check input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .sensation-name {
            flex: 1;
            font-size: 12px;
            padding-left: 5px;
        }
        .global-location {
            margin: 15px 0;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
        }
        .global-location label {
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
        }
        .global-location select {
            padding: 6px;
            font-size: 13px;
            border: 1px solid #ccc;
        }
        .condition-question {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            background-color: #fff;
            text-align: center;
        }
        .condition-question label {
            font-size: 14px;
            font-weight: bold;
            margin-right: 15px;
        }
        .condition-question select {
            padding: 8px 15px;
            font-size: 14px;
            border: 1px solid #ccc;
            min-width: 150px;
        }
        .other-section {
            margin: 15px 0;
            padding: 15px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
        }
        .other-section label {
            font-weight: bold;
            font-size: 13px;
        }
        .other-section input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .investigator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .investigator-field label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .investigator-field input,
        .investigator-field select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .electrode-columns {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }
        .electrode-column {
            flex: 1;
            padding: 15px;
            border: 1px solid #ddd;
            background-color: #fff;
        }
        .electrode-column h2 {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #ddd;
        }
        .electrode-column h3 {
            font-size: 14px;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        .comments-section {
            margin-top: 15px;
        }
        .comments-section textarea {
            width: 100%;
            height: 60px;
            padding: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .add-test-section {
            text-align: center;
            margin: 20px 0;
        }
        .add-test-btn {
            padding: 12px 30px;
            font-size: 14px;
            background-color: #4a90d9;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        .add-test-btn:hover {
            background-color: #357abd;
        }
        .section-wrapper {
            position: relative;
        }
        .remove-test-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            font-size: 12px;
            background-color: #dc3545;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }
        .remove-test-btn:hover {
            background-color: #c82333;
        }
        .submit-section {
            text-align: center;
            margin-top: 25px;
        }
        .submit-btn {
            padding: 12px 40px;
            font-size: 16px;
            background-color: #000;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #333;
        }
        .required {
            color: #c00;
        }
        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            margin-top: 20px;
        }
        .error-message {
            display: none;
            text-align: center;
            padding: 20px;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Sensation Threshold Testing</h1>

    <!-- Participant Metadata Section -->
    <div class="metadata-section">
        <h2>Participant Information</h2>
        <div class="metadata-row">
            <div class="metadata-field">
                <label for="subject-id">Subject ID <span class="required">*</span></label>
                <input type="text" id="subject-id" placeholder="e.g., 001" required>
            </div>
            <div class="metadata-field">
                <label for="experiment">Experiment</label>
                <input type="text" id="experiment" placeholder="e.g., TES_Study_01">
            </div>
            <div class="metadata-field">
                <label for="session">Session <span class="required">*</span></label>
                <select id="session" required>
                    <option value="">-- Select --</option>
                    <option value="ses-01">Session 1 (ses-01)</option>
                    <option value="ses-02">Session 2 (ses-02)</option>
                    <option value="ses-03">Session 3 (ses-03)</option>
                    <option value="ses-04">Session 4 (ses-04)</option>
                    <option value="ses-05">Session 5 (ses-05)</option>
                    <option value="ses-06">Session 6 (ses-06)</option>
                </select>
            </div>
            <div class="metadata-field">
                <label for="stim-count">No. Stimulations Before</label>
                <input type="number" id="stim-count" placeholder="e.g., 0" min="0">
            </div>
            <div class="metadata-field">
                <label for="target-region">Target Region <span class="required">*</span></label>
                <input type="text" id="target-region" placeholder="e.g., hippocampus" required>
            </div>
            <div class="metadata-field">
                <label for="region-side">Side</label>
                <select id="region-side" required>
                    <option value="">-- Select --</option>
                    <option value="left">Left</option>
                    <option value="right">Right</option>
                    <option value="bilateral">Bilateral</option>
                </select>
            </div>
            <div class="metadata-field">
                <label for="date">Date</label>
                <input type="date" id="date">
            </div>
        </div>
    </div>

    <!-- tACS Sections Container -->
    <div id="tacs-sections-container">
        <!-- tACS sections will be dynamically added here -->
    </div>

    <!-- Add tACS Test Button -->
    <div class="add-test-section">
        <button type="button" class="add-test-btn" id="add-tacs-btn">+ Add another tACS test</button>
    </div>

    <!-- TIS Sections Container -->
    <div id="tis-sections-container">
        <!-- TIS sections will be dynamically added here -->
    </div>

    <!-- Add TIS Test Button -->
    <div class="add-test-section">
        <button type="button" class="add-test-btn" id="add-tis-btn">+ Add another TIS test</button>
    </div>

    <!-- Additional Comments -->
    <div class="page-section investigator">
        <div class="comments-section">
            <label style="font-weight: bold; font-size: 13px;">Additional Comments:</label>
            <textarea id="investigator-comments" placeholder="Any additional notes..."></textarea>
        </div>
    </div>

    <form id="tacs-tis-form">
        <div class="submit-section">
            <button type="submit" class="submit-btn">Submit</button>
        </div>
    </form>

    <div class="success-message" id="success-message">
        <strong>Questionnaire saved successfully!</strong><br>
        File: <span id="filename"></span>
    </div>

    <div class="error-message" id="error-message">
        <strong>Error saving questionnaire</strong><br>
        <span id="error-text"></span>
    </div>

    <script>
        // Sensation categories with their sensations
        const sensationCategories = {
            'Discomfort': ['Pain', 'Stinging', 'Pinching', 'Itching', 'Heat', 'Pinprick'],
            'Mechanical': ['Tingling', 'Vibrations', 'Pushing', 'Pulling', 'Pressure'],
            'Reflex': ['Pulse', 'Muscle spasm', 'Phosphenes', 'Hair prickle']
        };

        // Generate sensation categories HTML for a given prefix
        function generateSensationsHTML(prefix) {
            let html = '<div class="sensation-categories">';
            
            Object.entries(sensationCategories).forEach(([categoryName, sensations]) => {
                html += `<div class="sensation-category">
                    <div class="category-header">${categoryName}</div>`;
                
                sensations.forEach(sensation => {
                    const sensationId = sensation.toLowerCase().replace(/\s+/g, '_').replace(/[/]/g, '_');
                    const fullId = `${prefix}-${sensationId}`;
                    
                    html += `<div class="sensation-item">
                        <span class="sensation-check">
                            <input type="checkbox" id="check-${fullId}">
                        </span>
                        <span class="sensation-name">${sensation}</span>
                    </div>`;
                });
                
                html += '</div>';
            });
            
            html += '</div>';
            return html;
        }

        // Create a new tACS section
        function createTACSSection(testNum) {
            const sectionId = `tacs-section-${testNum}`;
            const prefix = `tacs${testNum}`;
            
            const section = document.createElement('div');
            section.className = 'page-section investigator section-wrapper';
            section.id = sectionId;
            section.dataset.testNum = testNum;
            
            section.innerHTML = `
                <button type="button" class="remove-test-btn" onclick="removeTACSSection(this)">Remove test</button>
                <div class="section-header">
                    <div class="section-label">tACS (Test ${testNum})</div>
                    <div class="header-fields">
                        <div class="header-field">
                            <label for="${prefix}-frequency">Frequency (Hz)</label>
                            <input type="number" id="${prefix}-frequency" step="0.1" placeholder="e.g., 5">
                        </div>
                    </div>
                </div>
                
                <div class="electrode-columns">
                    <!-- Electrodes 1-2 -->
                    <div class="electrode-column">
                        <h2>Electrodes 1 - 2</h2>
                        <div class="investigator-grid">
                            <div class="investigator-field">
                                <label for="${prefix}-e12-threshold">Threshold (mA)</label>
                                <input type="number" id="${prefix}-e12-threshold" step="0.1" placeholder="e.g., 0.3">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e12-max">Max Applied (mA)</label>
                                <input type="number" id="${prefix}-e12-max" step="0.1" placeholder="e.g., 0.5">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e12-impedance">Impedance (kΩ)</label>
                                <input type="number" id="${prefix}-e12-impedance" step="0.1" placeholder="e.g., 8.8">
                            </div>
                        </div>
                        <h3>Did you experience any sensations just now?</h3>
                        <p class="section-subtitle">Check the box if present.</p>
                        <div id="${prefix}-e12-sensations-container">${generateSensationsHTML(`${prefix}-e12`)}</div>
                        <div class="other-section">
                            <label for="${prefix}-e12-other-sensation">Other (Please Specify):</label>
                            <input type="text" id="${prefix}-e12-other-sensation" placeholder="Describe any other sensation not listed above">
                        </div>
                        <div class="global-location">
                            <label for="${prefix}-e12-location">Location:</label>
                            <select id="${prefix}-e12-location">
                                <option value="">-- Select --</option>
                                <option value="left">Left</option>
                                <option value="left front">Left front</option>
                                <option value="left back">Left back</option>
                                <option value="right">Right</option>
                                <option value="right front">Right front</option>
                                <option value="right back">Right back</option>
                            </select>
                        </div>
                    </div>

                    <!-- Electrodes 3-4 -->
                    <div class="electrode-column">
                        <h2>Electrodes 3 - 4</h2>
                        <div class="investigator-grid">
                            <div class="investigator-field">
                                <label for="${prefix}-e34-threshold">Threshold (mA)</label>
                                <input type="number" id="${prefix}-e34-threshold" step="0.1" placeholder="e.g., 0.3">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e34-max">Max Applied (mA)</label>
                                <input type="number" id="${prefix}-e34-max" step="0.1" placeholder="e.g., 0.5">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e34-impedance">Impedance (kΩ)</label>
                                <input type="number" id="${prefix}-e34-impedance" step="0.1" placeholder="e.g., 8.8">
                            </div>
                        </div>
                        <h3>Did you experience any sensations just now?</h3>
                        <p class="section-subtitle">Check the box if present.</p>
                        <div id="${prefix}-e34-sensations-container">${generateSensationsHTML(`${prefix}-e34`)}</div>
                        <div class="other-section">
                            <label for="${prefix}-e34-other-sensation">Other (Please Specify):</label>
                            <input type="text" id="${prefix}-e34-other-sensation" placeholder="Describe any other sensation not listed above">
                        </div>
                        <div class="global-location">
                            <label for="${prefix}-e34-location">Location:</label>
                            <select id="${prefix}-e34-location">
                                <option value="">-- Select --</option>
                                <option value="left">Left</option>
                                <option value="left front">Left front</option>
                                <option value="left back">Left back</option>
                                <option value="right">Right</option>
                                <option value="right front">Right front</option>
                                <option value="right back">Right back</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Condition Question -->
                <div class="condition-question">
                    <label for="${prefix}-condition">Which condition do you think you had?</label>
                    <select id="${prefix}-condition">
                        <option value="">-- Select --</option>
                        <option value="real">Real</option>
                        <option value="placebo">Placebo</option>
                        <option value="dont_know">Don't know</option>
                    </select>
                </div>
            `;
            
            return section;
        }

        // Create a new TIS section
        function createTISSection(testNum) {
            const sectionId = `tis-section-${testNum}`;
            const prefix = `tis${testNum}`;
            
            const section = document.createElement('div');
            section.className = 'page-section investigator section-wrapper';
            section.id = sectionId;
            section.dataset.testNum = testNum;
            
            section.innerHTML = `
                <button type="button" class="remove-test-btn" onclick="removeTISSection(this)">Remove test</button>
                <div class="section-header">
                    <div class="section-label">TIS (Test ${testNum})</div>
                    <div class="header-fields">
                        <div class="header-field">
                            <label for="${prefix}-carrier-freq">Carrier Frequency (Hz)</label>
                            <input type="number" id="${prefix}-carrier-freq" step="1" placeholder="e.g., 2000">
                        </div>
                        <div class="header-field">
                            <label for="${prefix}-mod-freq">Modulation Frequency (Hz)</label>
                            <input type="number" id="${prefix}-mod-freq" step="1" placeholder="e.g., 5">
                        </div>
                    </div>
                </div>
                
                <div class="electrode-columns">
                    <!-- Electrodes 1-2 -->
                    <div class="electrode-column">
                        <h2>Electrodes 1 - 2</h2>
                        <div class="investigator-grid">
                            <div class="investigator-field">
                                <label for="${prefix}-e12-threshold">Threshold (mA)</label>
                                <input type="number" id="${prefix}-e12-threshold" step="0.1" placeholder="e.g., 0.3">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e12-max">Max Applied (mA)</label>
                                <input type="number" id="${prefix}-e12-max" step="0.1" placeholder="e.g., 0.5">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e12-impedance">Impedance (kΩ)</label>
                                <input type="number" id="${prefix}-e12-impedance" step="0.1" placeholder="e.g., 8.8">
                            </div>
                        </div>
                        <h3>Did you experience any sensations just now?</h3>
                        <p class="section-subtitle">Check the box if present.</p>
                        <div id="${prefix}-e12-sensations-container">${generateSensationsHTML(`${prefix}-e12`)}</div>
                        <div class="other-section">
                            <label for="${prefix}-e12-other-sensation">Other (Please Specify):</label>
                            <input type="text" id="${prefix}-e12-other-sensation" placeholder="Describe any other sensation not listed above">
                        </div>
                        <div class="global-location">
                            <label for="${prefix}-e12-location">Location:</label>
                            <select id="${prefix}-e12-location">
                                <option value="">-- Select --</option>
                                <option value="left">Left</option>
                                <option value="left front">Left front</option>
                                <option value="left back">Left back</option>
                                <option value="right">Right</option>
                                <option value="right front">Right front</option>
                                <option value="right back">Right back</option>
                            </select>
                        </div>
                    </div>

                    <!-- Electrodes 3-4 -->
                    <div class="electrode-column">
                        <h2>Electrodes 3 - 4</h2>
                        <div class="investigator-grid">
                            <div class="investigator-field">
                                <label for="${prefix}-e34-threshold">Threshold (mA)</label>
                                <input type="number" id="${prefix}-e34-threshold" step="0.1" placeholder="e.g., 0.3">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e34-max">Max Applied (mA)</label>
                                <input type="number" id="${prefix}-e34-max" step="0.1" placeholder="e.g., 0.5">
                            </div>
                            <div class="investigator-field">
                                <label for="${prefix}-e34-impedance">Impedance (kΩ)</label>
                                <input type="number" id="${prefix}-e34-impedance" step="0.1" placeholder="e.g., 8.8">
                            </div>
                        </div>
                        <h3>Did you experience any sensations just now?</h3>
                        <p class="section-subtitle">Check the box if present.</p>
                        <div id="${prefix}-e34-sensations-container">${generateSensationsHTML(`${prefix}-e34`)}</div>
                        <div class="other-section">
                            <label for="${prefix}-e34-other-sensation">Other (Please Specify):</label>
                            <input type="text" id="${prefix}-e34-other-sensation" placeholder="Describe any other sensation not listed above">
                        </div>
                        <div class="global-location">
                            <label for="${prefix}-e34-location">Location:</label>
                            <select id="${prefix}-e34-location">
                                <option value="">-- Select --</option>
                                <option value="left">Left</option>
                                <option value="left front">Left front</option>
                                <option value="left back">Left back</option>
                                <option value="right">Right</option>
                                <option value="right front">Right front</option>
                                <option value="right back">Right back</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Condition Question -->
                <div class="condition-question">
                    <label for="${prefix}-condition">Which condition do you think you had?</label>
                    <select id="${prefix}-condition">
                        <option value="">-- Select --</option>
                        <option value="real">Real</option>
                        <option value="placebo">Placebo</option>
                        <option value="dont_know">Don't know</option>
                    </select>
                </div>
            `;
            
            return section;
        }

        // Save data from all sections of a given type
        function saveSectionData(containerId, prefix) {
            const container = document.getElementById(containerId);
            const sections = container.querySelectorAll('.section-wrapper');
            const allData = [];
            
            sections.forEach(section => {
                const oldPrefix = `${prefix}${section.dataset.testNum}`;
                const data = collectSectionData(oldPrefix);
                allData.push(data);
            });
            
            return allData;
        }

        // Collect data for a specific prefix
        function collectSectionData(prefix) {
            const data = {
                frequency: document.getElementById(`${prefix}-frequency`)?.value || '',
                carrier_freq: document.getElementById(`${prefix}-carrier-freq`)?.value || '',
                mod_freq: document.getElementById(`${prefix}-mod-freq`)?.value || '',
                condition: document.getElementById(`${prefix}-condition`)?.value || '',
                e12: {
                    threshold: document.getElementById(`${prefix}-e12-threshold`)?.value || '',
                    max_applied: document.getElementById(`${prefix}-e12-max`)?.value || '',
                    impedance: document.getElementById(`${prefix}-e12-impedance`)?.value || '',
                    location: document.getElementById(`${prefix}-e12-location`)?.value || '',
                    other: document.getElementById(`${prefix}-e12-other-sensation`)?.value || '',
                    sensations: {}
                },
                e34: {
                    threshold: document.getElementById(`${prefix}-e34-threshold`)?.value || '',
                    max_applied: document.getElementById(`${prefix}-e34-max`)?.value || '',
                    impedance: document.getElementById(`${prefix}-e34-impedance`)?.value || '',
                    location: document.getElementById(`${prefix}-e34-location`)?.value || '',
                    other: document.getElementById(`${prefix}-e34-other-sensation`)?.value || '',
                    sensations: {}
                }
            };
            
            // Collect checkbox states
            Object.entries(sensationCategories).forEach(([categoryName, sensations]) => {
                sensations.forEach(sensation => {
                    const sensationId = sensation.toLowerCase().replace(/\s+/g, '_').replace(/[/]/g, '_');
                    
                    ['e12', 'e34'].forEach(electrode => {
                        const checkbox = document.getElementById(`check-${prefix}-${electrode}-${sensationId}`);
                        if (checkbox && checkbox.checked) {
                            data[electrode].sensations[sensationId] = true;
                        }
                    });
                });
            });
            
            return data;
        }

        // Restore data to a section
        function restoreSectionData(prefix, data) {
            if (!data) return;
            
            if (document.getElementById(`${prefix}-frequency`)) {
                document.getElementById(`${prefix}-frequency`).value = data.frequency || '';
            }
            if (document.getElementById(`${prefix}-carrier-freq`)) {
                document.getElementById(`${prefix}-carrier-freq`).value = data.carrier_freq || '';
            }
            if (document.getElementById(`${prefix}-mod-freq`)) {
                document.getElementById(`${prefix}-mod-freq`).value = data.mod_freq || '';
            }
            document.getElementById(`${prefix}-condition`).value = data.condition || '';
            
            ['e12', 'e34'].forEach(electrode => {
                document.getElementById(`${prefix}-${electrode}-threshold`).value = data[electrode]?.threshold || '';
                document.getElementById(`${prefix}-${electrode}-max`).value = data[electrode]?.max_applied || '';
                document.getElementById(`${prefix}-${electrode}-impedance`).value = data[electrode]?.impedance || '';
                document.getElementById(`${prefix}-${electrode}-location`).value = data[electrode]?.location || '';
                document.getElementById(`${prefix}-${electrode}-other-sensation`).value = data[electrode]?.other || '';
                
                // Restore checkboxes
                if (data[electrode]?.sensations) {
                    Object.entries(data[electrode].sensations).forEach(([sensationId, checked]) => {
                        const checkbox = document.getElementById(`check-${prefix}-${electrode}-${sensationId}`);
                        if (checkbox) checkbox.checked = checked;
                    });
                }
            });
        }

        // Renumber all sections of a given type
        function renumberSections(containerId, prefix, labelBase) {
            const container = document.getElementById(containerId);
            const sections = container.querySelectorAll('.section-wrapper');
            
            sections.forEach((section, index) => {
                const newNum = index + 1;
                section.dataset.testNum = newNum;
                section.id = `${prefix}-section-${newNum}`;
                
                // Update section label
                const label = section.querySelector('.section-label');
                if (label) label.textContent = `${labelBase} (Test ${newNum})`;
            });
        }

        // Add a new tACS section
        function addTACSSection() {
            const container = document.getElementById('tacs-sections-container');
            const testNum = container.querySelectorAll('.section-wrapper').length + 1;
            const section = createTACSSection(testNum);
            container.appendChild(section);
        }

        // Add a new TIS section
        function addTISSection() {
            const container = document.getElementById('tis-sections-container');
            const testNum = container.querySelectorAll('.section-wrapper').length + 1;
            const section = createTISSection(testNum);
            container.appendChild(section);
        }

        // Remove a tACS section
        function removeTACSSection(button) {
            const section = button.closest('.section-wrapper');
            const container = document.getElementById('tacs-sections-container');
            
            // Save data from all sections before removal
            const savedData = saveSectionData('tacs-sections-container', 'tacs');
            const sectionIndex = Array.from(container.querySelectorAll('.section-wrapper')).indexOf(section);
            
            // Remove the section
            section.remove();
            
            // Remove the saved data for this section
            savedData.splice(sectionIndex, 1);
            
            // Renumber remaining sections
            renumberSections('tacs-sections-container', 'tacs', 'tACS');
            
            // Restore data to renumbered sections
            const remainingSections = container.querySelectorAll('.section-wrapper');
            remainingSections.forEach((sec, index) => {
                const prefix = `tacs${index + 1}`;
                restoreSectionData(prefix, savedData[index]);
            });
        }

        // Remove a TIS section
        function removeTISSection(button) {
            const section = button.closest('.section-wrapper');
            const container = document.getElementById('tis-sections-container');
            
            // Save data from all sections before removal
            const savedData = saveSectionData('tis-sections-container', 'tis');
            const sectionIndex = Array.from(container.querySelectorAll('.section-wrapper')).indexOf(section);
            
            // Remove the section
            section.remove();
            
            // Remove the saved data for this section
            savedData.splice(sectionIndex, 1);
            
            // Renumber remaining sections
            renumberSections('tis-sections-container', 'tis', 'TIS');
            
            // Restore data to renumbered sections
            const remainingSections = container.querySelectorAll('.section-wrapper');
            remainingSections.forEach((sec, index) => {
                const prefix = `tis${index + 1}`;
                restoreSectionData(prefix, savedData[index]);
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Add first sections
            addTACSSection();
            addTISSection();
            
            // Set default date to today
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            
            // Add button handlers
            document.getElementById('add-tacs-btn').addEventListener('click', addTACSSection);
            document.getElementById('add-tis-btn').addEventListener('click', addTISSection);
        });

        // Collect sensations data for a specific electrode group
        function collectSensations(prefix) {
            const data = {};
            const location = document.getElementById(`${prefix}-location`)?.value || '';
            
            // Iterate through all categories
            Object.entries(sensationCategories).forEach(([categoryName, sensations]) => {
                sensations.forEach(sensation => {
                    const sensationId = sensation.toLowerCase().replace(/\s+/g, '_').replace(/[/]/g, '_');
                    const fullId = `${prefix}-${sensationId}`;
                    const checkbox = document.getElementById(`check-${fullId}`);
                    
                    if (checkbox && checkbox.checked) {
                        data[sensationId] = true;
                    }
                });
            });

            // Collect "other" sensation
            const otherInput = document.getElementById(`${prefix}-other-sensation`);
            if (otherInput && otherInput.value.trim()) {
                data['other'] = otherInput.value.trim();
            }

            return {
                sensations: data,
                location: location
            };
        }

        // Collect data for a tACS test
        function collectTACSData(testNum) {
            const prefix = `tacs${testNum}`;
            
            const e12Data = collectSensations(`${prefix}-e12`);
            const e34Data = collectSensations(`${prefix}-e34`);
            
            return {
                test_number: testNum,
                frequency: document.getElementById(`${prefix}-frequency`)?.value || '',
                condition: document.getElementById(`${prefix}-condition`)?.value || '',
                e12: {
                    threshold: document.getElementById(`${prefix}-e12-threshold`)?.value || '',
                    max_applied: document.getElementById(`${prefix}-e12-max`)?.value || '',
                    impedance: document.getElementById(`${prefix}-e12-impedance`)?.value || '',
                    sensations: e12Data.sensations,
                    location: e12Data.location
                },
                e34: {
                    threshold: document.getElementById(`${prefix}-e34-threshold`)?.value || '',
                    max_applied: document.getElementById(`${prefix}-e34-max`)?.value || '',
                    impedance: document.getElementById(`${prefix}-e34-impedance`)?.value || '',
                    sensations: e34Data.sensations,
                    location: e34Data.location
                }
            };
        }

        // Collect data for a TIS test
        function collectTISData(testNum) {
            const prefix = `tis${testNum}`;
            
            const e12Data = collectSensations(`${prefix}-e12`);
            const e34Data = collectSensations(`${prefix}-e34`);
            
            return {
                test_number: testNum,
                carrier_frequency: document.getElementById(`${prefix}-carrier-freq`)?.value || '',
                modulation_frequency: document.getElementById(`${prefix}-mod-freq`)?.value || '',
                condition: document.getElementById(`${prefix}-condition`)?.value || '',
                e12: {
                    threshold: document.getElementById(`${prefix}-e12-threshold`)?.value || '',
                    max_applied: document.getElementById(`${prefix}-e12-max`)?.value || '',
                    impedance: document.getElementById(`${prefix}-e12-impedance`)?.value || '',
                    sensations: e12Data.sensations,
                    location: e12Data.location
                },
                e34: {
                    threshold: document.getElementById(`${prefix}-e34-threshold`)?.value || '',
                    max_applied: document.getElementById(`${prefix}-e34-max`)?.value || '',
                    impedance: document.getElementById(`${prefix}-e34-impedance`)?.value || '',
                    sensations: e34Data.sensations,
                    location: e34Data.location
                }
            };
        }

        // Form submission
        document.getElementById('tacs-tis-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Get metadata
            const subjectId = document.getElementById('subject-id').value.trim();
            const experiment = document.getElementById('experiment').value.trim();
            const session = document.getElementById('session').value;
            const stimCount = document.getElementById('stim-count').value;
            const targetRegion = document.getElementById('target-region').value.trim();
            const regionSide = document.getElementById('region-side').value;
            const date = document.getElementById('date').value;

            // Validate metadata
            if (!subjectId) {
                alert('Please enter a Subject ID');
                return;
            }
            if (!session) {
                alert('Please select a Session');
                return;
            }

            // Collect all tACS data
            const tacsTests = [];
            const tacsSections = document.querySelectorAll('#tacs-sections-container .section-wrapper');
            tacsSections.forEach(section => {
                const testNum = parseInt(section.dataset.testNum);
                tacsTests.push(collectTACSData(testNum));
            });

            // Collect all TIS data
            const tisTests = [];
            const tisSections = document.querySelectorAll('#tis-sections-container .section-wrapper');
            tisSections.forEach(section => {
                const testNum = parseInt(section.dataset.testNum);
                tisTests.push(collectTISData(testNum));
            });

            // Collect comments
            const comments = document.getElementById('investigator-comments').value;

            // Prepare data
            const data = {
                subject: subjectId,
                experiment: experiment,
                session: session,
                type: 'tacs_tis_sensation_testing',
                stim_count: stimCount,
                target_region: targetRegion,
                region_side: regionSide,
                date: date || new Date().toISOString().split('T')[0],
                tacs_tests: tacsTests,
                tis_tests: tisTests,
                comments: comments
            };

            // Try server first, fallback to download
            let savedToServer = false;
            
            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        savedToServer = true;
                        document.getElementById('filename').textContent = 
                            `sub-${subjectId}/${session}/beh/${result.filename}`;
                        document.getElementById('success-message').style.display = 'block';
                        document.getElementById('error-message').style.display = 'none';
                    }
                }
            } catch (error) {
                console.log('Server not available, using download fallback');
            }

            // Fallback: download CSV
            if (!savedToServer) {
                const timestamp = new Date().toISOString();
                
                // Helper to escape CSV fields
                const escapeCSV = (val) => {
                    if (val === null || val === undefined) return '';
                    const str = String(val);
                    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                        return `"${str.replace(/"/g, '""')}"`;
                    }
                    return str;
                };
                
                // Helper to get checked sensations as comma-separated list
                const getSensationsList = (sensationsData) => {
                    const checked = [];
                    Object.entries(sensationCategories).forEach(([category, sensations]) => {
                        sensations.forEach(sensation => {
                            const id = sensation.toLowerCase().replace(/\s+/g, '_').replace(/[/]/g, '_');
                            if (sensationsData[id]) {
                                checked.push(sensation);
                            }
                        });
                    });
                    return checked.join(',');
                };
                
                // Build header (same for all rows)
                let header = 'subject,experiment,session,stim_count,date,target_region,region_side,test_type,test_number,timestamp';
                header += ',frequency,carrier_frequency,modulation_frequency,condition';
                
                ['e12', 'e34'].forEach(electrode => {
                    const prefix = `${electrode}`;
                    header += `,${prefix}_threshold,${prefix}_max_applied,${prefix}_impedance,${prefix}_sensations,${prefix}_location,${prefix}_other`;
                });
                
                header += ',comments';
                
                // Build rows
                let rows = '';
                
                // tACS rows (one per test)
                tacsTests.forEach(tacs => {
                    let tacsRow = `${escapeCSV(subjectId)},${escapeCSV(experiment)},${escapeCSV(session)},${escapeCSV(stimCount)},${escapeCSV(date || timestamp.split('T')[0])},${escapeCSV(targetRegion)},${escapeCSV(regionSide)},tacs,${tacs.test_number},${escapeCSV(timestamp)}`;
                    tacsRow += `,${escapeCSV(tacs.frequency)},,${escapeCSV(tacs.condition)}`;
                    
                    ['e12', 'e34'].forEach(electrode => {
                        tacsRow += `,${escapeCSV(tacs[electrode].threshold)},${escapeCSV(tacs[electrode].max_applied)},${escapeCSV(tacs[electrode].impedance)},${escapeCSV(getSensationsList(tacs[electrode].sensations))},${escapeCSV(tacs[electrode].location)},${escapeCSV(tacs[electrode].sensations.other || '')}`;
                    });
                    tacsRow += `,${escapeCSV(comments)}`;
                    rows += tacsRow + '\n';
                });
                
                // TIS rows (one per test)
                tisTests.forEach(tis => {
                    let tisRow = `${escapeCSV(subjectId)},${escapeCSV(experiment)},${escapeCSV(session)},${escapeCSV(stimCount)},${escapeCSV(date || timestamp.split('T')[0])},${escapeCSV(targetRegion)},${escapeCSV(regionSide)},tis,${tis.test_number},${escapeCSV(timestamp)}`;
                    tisRow += `,,${escapeCSV(tis.carrier_frequency)},${escapeCSV(tis.modulation_frequency)},${escapeCSV(tis.condition)}`;
                    
                    ['e12', 'e34'].forEach(electrode => {
                        tisRow += `,${escapeCSV(tis[electrode].threshold)},${escapeCSV(tis[electrode].max_applied)},${escapeCSV(tis[electrode].impedance)},${escapeCSV(getSensationsList(tis[electrode].sensations))},${escapeCSV(tis[electrode].location)},${escapeCSV(tis[electrode].sensations.other || '')}`;
                    });
                    tisRow += `,${escapeCSV(comments)}`;
                    rows += tisRow + '\n';
                });
                
                const filename = `sub-${subjectId}_${session}_tacs_tis_sensation.csv`;
                const blob = new Blob([header + '\n' + rows], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                document.getElementById('filename').textContent = filename + ' (downloaded)';
                document.getElementById('success-message').style.display = 'block';
                document.getElementById('error-message').style.display = 'none';
            }
        });
    </script>
</body>
</html>
